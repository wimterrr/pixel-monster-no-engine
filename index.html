<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Monster No Engine</title>
    <script>
      // GitHub Pages sometimes gets opened without a trailing slash, which breaks relative asset URLs.
      (function () {
        var path = window.location.pathname || "";
        var last = path.split("/").pop() || "";
        var looksLikeFile = last.indexOf(".") !== -1;
        if (!looksLikeFile && path && !path.endsWith("/")) {
          window.location.replace(path + "/" + window.location.search + window.location.hash);
        }
      })();
    </script>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Compiler-first route slice</p>
        <h1>Route01</h1>
        <p class="lede">
          Runtime only reads the compiled bundle. Walk into tall grass, trigger one encounter,
          capture Sprout, then prove the reload receipt survives.
        </p>
      </section>
      <section class="playfield">
        <div class="stage">
          <canvas id="game" width="320" height="256" aria-label="Route01 canvas"></canvas>
          <div class="mobile-controls" role="group" aria-label="Movement controls">
            <button class="dpad up" data-move="up" type="button">UP</button>
            <button class="dpad left" data-move="left" type="button">LEFT</button>
            <button class="dpad down" data-move="down" type="button">DOWN</button>
            <button class="dpad right" data-move="right" type="button">RIGHT</button>
          </div>
          <div class="hudbar">
            <div id="hud" class="hud" aria-label="HUD"></div>
            <button id="menu-btn" class="menu-btn" type="button">MENU</button>
          </div>
          <div class="battle-strip">
            <p id="battle-text">Step into grass to trigger the first encounter.</p>
            <div class="actions">
              <button id="fight-btn" disabled type="button">Fight</button>
              <button id="capture-btn" disabled type="button">Capture</button>
            </div>
            <div class="actions">
              <button id="save-btn" type="button">Save Receipt</button>
              <button id="reload-btn" type="button">Reload Save</button>
            </div>
            <pre id="payload" class="payload">No battle payload yet.</pre>
          </div>
        </div>
        <div id="panel-backdrop" class="panel-backdrop" hidden></div>
        <aside class="panel">
          <div class="panel-top">
            <h2 class="panel-title">Menu</h2>
            <button id="panel-close" class="panel-close" type="button">Close</button>
          </div>
          <div class="card">
            <h2>Reload Receipt</h2>
            <dl id="receipt" class="receipt"></dl>
          </div>
          <div class="card">
            <h2>Log</h2>
            <ul id="log" class="log"></ul>
          </div>
        </aside>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
